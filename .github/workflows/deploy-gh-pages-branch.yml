# Plano B: publica o build na branch gh-pages (órfã).
# Se Actions não atualizar o domínio: Settings → Pages → Deploy from branch → gh-pages → / (root)
name: Deploy gh-pages branch (plano B)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build
          touch dist/.nojekyll
          cp ../CNAME dist/CNAME
          cp dist/index.html dist/404.html

      - name: Publicar em gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: frontend/dist
          force_orphan: true
