# Publica o site React (frontend/dist) no GitHub Pages.
# Requer: Settings → Pages → Source = GitHub Actions
name: Deploy frontend (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'CNAME'
      - '.github/workflows/deploy-frontend-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar e buildar
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build

      - name: CNAME e fallback SPA (GitHub Pages)
        run: |
          cp CNAME frontend/dist/CNAME
          cp frontend/dist/index.html frontend/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
