# Publica frontend/dist no GitHub Pages (artefato Actions).
# Settings → Pages → Source: GitHub Actions
name: Deploy frontend (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar, testar e buildar
        working-directory: frontend
        run: |
          npm ci
          npm test
          npm run build
          touch dist/.nojekyll

      - name: CNAME e fallback SPA
        run: |
          cp CNAME frontend/dist/CNAME
          cp frontend/dist/index.html frontend/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no Pages
        id: deployment
        uses: actions/deploy-pages@v4
