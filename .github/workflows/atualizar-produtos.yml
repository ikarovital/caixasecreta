# Toda vez que a planilha for atualizada (push), gera dados/produtos.json e atualiza o site.
name: Atualizar produtos da planilha

on:
  push:
    paths:
      - 'imagens/docs/Planilha_Produtos.xlsx'
      - 'imagens/docs/**'
  workflow_dispatch:  # Permite rodar manualmente em Actions

jobs:
  atualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar produtos a partir da planilha
        run: npm run atualizar-produtos

      - name: Fazer commit e push se produtos.json mudou
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados/produtos.json
          if git diff --staged --quiet; then
            echo "Nenhuma alteração em dados/produtos.json"
          else
            git commit -m "Atualizar produtos a partir da planilha"
            git push
          fi
